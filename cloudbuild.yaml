steps:
  # Step 1: Build Docker image (tagged with both commit SHA and latest)
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/trading-skills:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/trading-skills:latest'
      - '.'

  # Step 2: Push commit-SHA tag
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/trading-skills:$COMMIT_SHA']

  # Step 3: Push latest tag
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/trading-skills:latest']

  # Step 4: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'trading-skills'
      - '--image=gcr.io/$PROJECT_ID/trading-skills:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--port=8080'
      - '--set-env-vars=PORT=8080'
      - '--timeout=300'

images:
  - 'gcr.io/$PROJECT_ID/trading-skills:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/trading-skills:latest'

options:
  logging: CLOUD_LOGGING_ONLY
